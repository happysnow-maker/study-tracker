<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>학습 현황 — 부모 대시보드</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root{
  --bg:#F4F6F9;--card:#fff;--border:rgba(0,0,0,0.08);
  --text:#1A1A2E;--text2:#6B7280;--text3:#9CA3AF;
  --hb:#1A237E;--hs:#1B5E20;
  --r:14px;--sh:0 2px 10px rgba(0,0,0,0.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}

.header{background:#1A237E;padding:max(48px,calc(40px + env(safe-area-inset-top))) 16px 20px}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-size:18px;font-weight:700;color:#fff}
.hdr-date{font-size:12px;color:rgba(255,255,255,.65);margin-top:3px}
.refresh-btn{background:rgba(255,255,255,.18);border:none;color:#fff;padding:7px 13px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}

.tab-bar{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.tab{flex:1;padding:12px 2px;font-size:12px;font-weight:500;text-align:center;cursor:pointer;color:var(--text3);border:none;border-bottom:2.5px solid transparent;background:none;font-family:inherit}
.tab.on{color:var(--hb);border-bottom-color:var(--hb)}

.page{display:none;padding:14px}
.page.on{display:block}

.kid-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.kid-tab{padding:10px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;transition:all .2s}

.m-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.m-box{background:var(--card);border-radius:var(--r);padding:13px 14px;box-shadow:var(--sh)}
.m-lbl{font-size:11px;color:var(--text2);margin-bottom:4px}
.m-val{font-size:24px;font-weight:700;color:var(--text);line-height:1}
.m-unit{font-size:12px;font-weight:400;color:var(--text2);margin-left:2px}
.m-sub{font-size:10px;color:var(--text3);margin-top:3px}

.card{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--sh);margin-bottom:12px}
.card-ttl{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:12px}

.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.bar-lbl{font-size:12px;color:var(--text2);width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-wrap{flex:1;height:8px;background:#F0F0F0;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.bar-val{font-size:11px;color:var(--text2);width:42px;text-align:right;flex-shrink:0}

/* 달력 - 모바일 최적화 */
.cal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-nav{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);border-radius:9px;font-size:14px;cursor:pointer;color:var(--text);font-family:inherit}
.cal-title{font-size:15px;font-weight:700;color:var(--text)}
.legend{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--text2)}
.legend-box{width:10px;height:10px;border-radius:3px;border:1px solid}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{font-size:10px;font-weight:600;color:var(--text3);text-align:center;padding:3px 0}
.cal-dow:first-child{color:#E53935}.cal-dow:last-child{color:#1E88E5}
.cal-day{
  aspect-ratio:1;border-radius:7px;font-size:12px;font-weight:500;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--card);border:1px solid var(--border);gap:1px;
  padding:2px 0;
}
.cal-day.empty{background:transparent;border:none}
.cal-day.today{border:2px solid var(--hb);color:var(--hb);font-weight:700}
.cal-day.both{background:#E8F5E9;border-color:#81C784}
.cal-day.hb-only{background:#E8EAF6;border-color:#9FA8DA}
.cal-day.hs-only{background:#F3E5F5;border-color:#CE93D8}
.cal-day.sun{color:#E53935}.cal-day.sat{color:#1E88E5}
.cal-dots{display:flex;gap:2px;margin-top:1px}
.cal-dot{width:4px;height:4px;border-radius:50%}
.cal-stamp{font-size:9px;line-height:1}

/* 주간 */
.week-row{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.week-day{font-size:11px;color:var(--text2);width:28px;flex-shrink:0;text-align:center;line-height:1.3}
.week-bar-wrap{flex:1;height:8px;background:#F0F0F0;border-radius:4px;overflow:hidden}
.week-bar{height:100%;border-radius:4px}
.week-stamp{font-size:11px;width:14px;flex-shrink:0;text-align:center}
.week-val{font-size:11px;color:var(--text3);width:36px;text-align:right;flex-shrink:0}

.spin{display:inline-block;animation:spin 1s linear infinite;font-size:20px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:32px;color:var(--text3);font-size:13px}
.err{background:#FFEBEE;border-radius:10px;padding:12px;color:#C62828;font-size:13px;line-height:1.6;margin-bottom:10px}
</style>
</head>
<body>

<div class="header">
  <div class="hdr-row">
    <div>
      <div class="hdr-title">📊 학습 현황</div>
      <div class="hdr-date" id="hdrDate"></div>
    </div>
    <button class="refresh-btn" onclick="refreshAll()">↻ 새로고침</button>
  </div>
</div>

<div class="tab-bar">
  <button class="tab on" onclick="gotoTab('overview',this)">종합</button>
  <button class="tab" onclick="gotoTab('calendar',this)">달력</button>
  <button class="tab" onclick="gotoTab('subject',this)">과목별</button>
  <button class="tab" onclick="gotoTab('weekly',this)">주간</button>
</div>

<div class="page on" id="page-overview">
  <div class="kid-tabs">
    <button class="kid-tab on" id="otab0" onclick="switchOver(0)">한별 (중1)</button>
    <button class="kid-tab" id="otab1" onclick="switchOver(1)">한솔 (초3)</button>
  </div>
  <div id="overviewWrap"><div class="loading"><span class="spin">⏳</span><br>불러오는 중...</div></div>
</div>

<div class="page" id="page-calendar">
  <div class="cal-top">
    <button class="cal-nav" onclick="chMo(-1)">◀</button>
    <span class="cal-title" id="calTitle"></span>
    <button class="cal-nav" onclick="chMo(1)">▶</button>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-box" style="background:#E8F5E9;border-color:#81C784"></div>둘다</div>
    <div class="legend-item"><div class="legend-box" style="background:#E8EAF6;border-color:#9FA8DA"></div>한별</div>
    <div class="legend-item"><div class="legend-box" style="background:#F3E5F5;border-color:#CE93D8"></div>한솔</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<div class="page" id="page-subject">
  <div class="kid-tabs">
    <button class="kid-tab on" id="stab0" onclick="switchSubj(0)">한별</button>
    <button class="kid-tab" id="stab1" onclick="switchSubj(1)">한솔</button>
  </div>
  <div id="subjWrap"><div class="loading"><span class="spin">⏳</span><br>불러오는 중...</div></div>
</div>

<div class="page" id="page-weekly">
  <div class="kid-tabs">
    <button class="kid-tab on" id="wtab0" onclick="switchWeek(0)">한별</button>
    <button class="kid-tab" id="wtab1" onclick="switchWeek(1)">한솔</button>
  </div>
  <div id="weekWrap"><div class="loading"><span class="spin">⏳</span><br>불러오는 중...</div></div>
</div>

<script>
const SHEET_ID='18k-eTGSxJrered7NpY-g8U5-pevH67Ccficdbtnu7IY';
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbwyS8xe3LMBMTmVPPd3TFWbfZgzsRXTrXH0qtprFBufucHIKrQ-Dm0_5xkQ4a1kx1CjsQ/exec';

// 과목 이름을 시트에 저장된 이름(한글)과 일치시킴
const KIDS=[
  {name:'한별',grade:'중1',color:'#1A237E',goal:120,
   subjects:[
     {name:'수학',color:'#1565C0'},{name:'영어',color:'#2E7D32'},
     {name:'국어',color:'#E65100'},{name:'사회',color:'#4527A0'},
     {name:'과학',color:'#B71C1C'},{name:'독서(신문,독서평설 포함)',color:'#00695C'},
   ]},
  {name:'한솔',grade:'초3',color:'#1B5E20',goal:60,
   subjects:[
     {name:'수학',color:'#1565C0'},{name:'영어',color:'#2E7D32'},
     {name:'독서(독서평설 포함)',color:'#E65100'},{name:'온리원',color:'#6A1B9A'},
   ]},
];

const TODAY=new Date();
const TODAYSTR=TODAY.toISOString().slice(0,10);
let calYear=TODAY.getFullYear(),calMonth=TODAY.getMonth();
let curOver=0,curSubj=0,curWeek=0;
let cache={}; // "한별_4" => [{날짜,과목,분,...}]

function fmtMin(m){
  if(!m||m===0) return '0분';
  const h=Math.floor(m/60),min=m%60;
  return h>0?h+'시간'+(min?min+'분':''):m+'분';
}

function normDate(v){
  if(!v && v!==0) return '';
  if(v instanceof Date){
    // 한국시간(UTC+9) 기준으로 변환
    const kst = new Date(v.getTime() + 9*60*60*1000);
    return kst.toISOString().slice(0,10);
  }
  const s = String(v).trim().replace(/\//g,'-').replace(/\./g,'-');
  // "2026-04-01T..." 형식도 처리
  return s.slice(0,10);
}

async function fetchSheet(kidName,month){
  const key=kidName+'_'+month;
  if(cache[key]) return cache[key];
  try{
    const url=SCRIPT_URL+'?sheetId='+SHEET_ID+'&kid='+encodeURIComponent(kidName)+'&month='+month;
    const res=await fetch(url);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    cache[key]=Array.isArray(data)?data:[];
    return cache[key];
  }catch(e){console.error(e);return [];}
}

// 날짜별 분 합산 {ds: {과목명: 분}}
function buildByDate(rows){
  const bd={};
  rows.forEach(r=>{
    // 날짜: 키가 '날짜'인 것 우선, 없으면 첫번째 값 사용
    const rawDate = r['날짜'] !== undefined ? r['날짜'] : Object.values(r)[0];
    const ds = normDate(rawDate);
    if(!ds || ds.length < 10 || !ds.startsWith('20')) return;

    // 과목: 키가 '과목'인 것
    const subj = String(r['과목'] !== undefined ? r['과목'] : Object.values(r)[1] || '').trim();
    if(!subj) return;

    // 분: 숫자로 변환
    const rawMin = r['분'] !== undefined ? r['분'] : Object.values(r)[4];
    const mins = parseInt(rawMin) || 0;

    if(!bd[ds]) bd[ds] = {total:0};
    bd[ds][subj] = (bd[ds][subj]||0) + mins;
    bd[ds].total = (bd[ds].total||0) + mins;
  });
  return bd;
}

function calcStats(bd,kidIdx){
  const k=KIDS[kidIdx];
  const y=TODAY.getFullYear(),mo=TODAY.getMonth();
  const days=new Date(y,mo+1,0).getDate();
  const subjTotals={};k.subjects.forEach(s=>subjTotals[s.name]=0);
  let studyDays=0,totalAll=0,goalDays=0,curStr=0,maxStr=0;
  for(let d=1;d<=days;d++){
    const ds=y+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const day=bd[ds]||{};
    const dt=day.total||0;
    k.subjects.forEach(s=>{
      // 과목명이 정확히 일치하는 것만 집계
      const matched = Object.keys(day).find(key=>key===s.name);
      subjTotals[s.name]+= matched ? (day[matched]||0) : 0;
    });
    if(dt>0){studyDays++;curStr++;}else{maxStr=Math.max(maxStr,curStr);curStr=0;}
    if(dt>=k.goal) goalDays++;
    totalAll+=dt;
  }
  maxStr=Math.max(maxStr,curStr);
  return{subjTotals,studyDays,totalAll,goalDays,avg:studyDays>0?Math.round(totalAll/studyDays):0,maxStr};
}

// ── 종합 ──
let bdCache=[null,null];
async function renderOverview(){
  const wrap=document.getElementById('overviewWrap');
  wrap.innerHTML='<div class="loading"><span class="spin">⏳</span><br>불러오는 중...</div>';
  try{
    const mo=TODAY.getMonth()+1;
    if(!bdCache[0]){ const r=await fetchSheet(KIDS[0].name,mo); bdCache[0]=buildByDate(r); }
    if(!bdCache[1]){ const r=await fetchSheet(KIDS[1].name,mo); bdCache[1]=buildByDate(r); }
    const k=KIDS[curOver];
    const st=calcStats(bdCache[curOver],curOver);
    const st0=calcStats(bdCache[0],0);
    const st1=calcStats(bdCache[1],1);
    const maxT=Math.max(st0.totalAll,st1.totalAll,1);
    const maxV=Math.max(...Object.values(st.subjTotals),1);
    let bars='';
    k.subjects.forEach(s=>{
      const pct=Math.round((st.subjTotals[s.name]||0)/maxV*100);
      bars+=`<div class="bar-row">
        <span class="bar-lbl" title="${s.name}">${s.name}</span>
        <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${s.color}"></div></div>
        <span class="bar-val">${fmtMin(st.subjTotals[s.name]||0)}</span>
      </div>`;
    });
    wrap.innerHTML=`
      <div class="m-grid">
        <div class="m-box"><div class="m-lbl">공부한 날</div><div class="m-val">${st.studyDays}<span class="m-unit">일</span></div><div class="m-sub">이번 달 누계</div></div>
        <div class="m-box"><div class="m-lbl">하루 평균</div><div class="m-val">${st.avg}<span class="m-unit">분</span></div><div class="m-sub">공부한 날 기준</div></div>
        <div class="m-box"><div class="m-lbl">목표 달성일</div><div class="m-val">${st.goalDays}<span class="m-unit">일</span></div><div class="m-sub">목표 ${k.goal}분/일</div></div>
        <div class="m-box"><div class="m-lbl">최장 연속</div><div class="m-val">${st.maxStr}<span class="m-unit">일</span></div><div class="m-sub">연속 공부</div></div>
      </div>
      <div class="card">
        <div class="card-ttl">이번 달 두 아이 비교 (현재까지)</div>
        <div class="bar-row">
          <span class="bar-lbl" style="color:${KIDS[0].color};font-weight:600">한별</span>
          <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(st0.totalAll/maxT*100)}%;background:${KIDS[0].color}"></div></div>
          <span class="bar-val">${fmtMin(st0.totalAll)}</span>
        </div>
        <div class="bar-row">
          <span class="bar-lbl" style="color:${KIDS[1].color};font-weight:600">한솔</span>
          <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(st1.totalAll/maxT*100)}%;background:${KIDS[1].color}"></div></div>
          <span class="bar-val">${fmtMin(st1.totalAll)}</span>
        </div>
      </div>
      <div class="card">
        <div class="card-ttl">${k.name} 과목별 공부시간 (이번 달)</div>
        ${bars}
      </div>`;
  }catch(e){
    wrap.innerHTML=`<div class="err">불러오기 실패: ${e.message}<br>인터넷 연결 및 Apps Script 설정을 확인해주세요.</div>`;
  }
}

function switchOver(ki){
  curOver=ki;
  [0,1].forEach(i=>{
    const b=document.getElementById('otab'+i);
    b.classList.toggle('on',i===ki);
    b.style.background=i===ki?KIDS[i].color:'';
    b.style.color=i===ki?'#fff':'';
  });
  renderOverview();
}

// ── 달력 ──
async function renderCal(){
  document.getElementById('calTitle').textContent=calYear+'년 '+(calMonth+1)+'월';
  const grid=document.getElementById('calGrid');
  grid.innerHTML='<div style="grid-column:1/-1;padding:20px;text-align:center;color:var(--text3);font-size:12px">불러오는 중...</div>';
  const mo=calMonth+1;
  const [r0,r1]=await Promise.all([fetchSheet(KIDS[0].name,mo),fetchSheet(KIDS[1].name,mo)]);
  const bd0=buildByDate(r0),bd1=buildByDate(r1);
  grid.innerHTML='';
  ['일','월','화','수','목','금','토'].forEach((d,i)=>{
    const el=document.createElement('div');el.className='cal-dow';
    if(i===0)el.style.color='#E53935';if(i===6)el.style.color='#1E88E5';
    el.textContent=d;grid.appendChild(el);
  });
  const first=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  for(let i=0;i<first;i++){const e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e);}
  for(let d=1;d<=daysInMonth;d++){
    const ds=calYear+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const t0=(bd0[ds]||{}).total||0;
    const t1=(bd1[ds]||{}).total||0;
    const wd=new Date(calYear,calMonth,d).getDay();
    const el=document.createElement('div');
    const cls=['cal-day'];
    if(ds===TODAYSTR)cls.push('today');
    if(t0>0&&t1>0)cls.push('both');
    else if(t0>0)cls.push('hb-only');
    else if(t1>0)cls.push('hs-only');
    if(wd===0)cls.push('sun');if(wd===6)cls.push('sat');
    el.className=cls.join(' ');
    const s0=t0>=KIDS[0].goal&&t0>0?'🏆':'';
    const s1=t1>=KIDS[1].goal&&t1>0?'🏆':'';
    el.innerHTML='<span>'+d+'</span>'+
      ((t0>0||t1>0)?'<div class="cal-dots">'+
        (t0>0?'<div class="cal-dot" style="background:'+KIDS[0].color+'"></div>':'')+
        (t1>0?'<div class="cal-dot" style="background:'+KIDS[1].color+'"></div>':'')+
      '</div>':'')+
      (s0||s1?'<span class="cal-stamp">'+s0+s1+'</span>':'');
    grid.appendChild(el);
  }
}
function chMo(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  // 해당 월 캐시 삭제
  delete cache[KIDS[0].name+'_'+(calMonth+1)];
  delete cache[KIDS[1].name+'_'+(calMonth+1)];
  renderCal();
}

// ── 과목별 ──
async function renderSubj(){
  const wrap=document.getElementById('subjWrap');
  wrap.innerHTML='<div class="loading"><span class="spin">⏳</span><br>불러오는 중...</div>';
  try{
    const mo=TODAY.getMonth()+1;
    if(!bdCache[curSubj]){const r=await fetchSheet(KIDS[curSubj].name,mo);bdCache[curSubj]=buildByDate(r);}
    const k=KIDS[curSubj];
    const st=calcStats(bdCache[curSubj],curSubj);
    const maxV=Math.max(...Object.values(st.subjTotals),1);
    // 공부 일수 계산
    const y=TODAY.getFullYear();
    const days=new Date(y,mo,0).getDate();
    const dayCnt={};k.subjects.forEach(s=>dayCnt[s.name]=0);
    for(let d=1;d<=days;d++){
      const ds=y+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      const day=bdCache[curSubj][ds]||{};
      k.subjects.forEach(s=>{if((day[s.name]||0)>0)dayCnt[s.name]++;});
    }
    const maxD=Math.max(...Object.values(dayCnt),1);
    let timeBars='',dayBars='';
    k.subjects.forEach(s=>{
      const tp=Math.round((st.subjTotals[s.name]||0)/maxV*100);
      const dp=Math.round(dayCnt[s.name]/maxD*100);
      timeBars+=`<div class="bar-row"><span class="bar-lbl" title="${s.name}">${s.name}</span><div class="bar-wrap"><div class="bar-fill" style="width:${tp}%;background:${s.color}"></div></div><span class="bar-val">${fmtMin(st.subjTotals[s.name]||0)}</span></div>`;
      dayBars+=`<div class="bar-row"><span class="bar-lbl" title="${s.name}">${s.name}</span><div class="bar-wrap"><div class="bar-fill" style="width:${dp}%;background:${s.color}"></div></div><span class="bar-val">${dayCnt[s.name]}일</span></div>`;
    });
    wrap.innerHTML=`
      <div class="card"><div class="card-ttl">과목별 총 공부시간</div>${timeBars}</div>
      <div class="card"><div class="card-ttl">과목별 공부 일수</div>${dayBars}</div>`;
  }catch(e){wrap.innerHTML=`<div class="err">불러오기 실패: ${e.message}</div>`;}
}
function switchSubj(ki){
  curSubj=ki;
  [0,1].forEach(i=>{const b=document.getElementById('stab'+i);b.classList.toggle('on',i===ki);b.style.background=i===ki?KIDS[i].color:'';b.style.color=i===ki?'#fff':'';});
  renderSubj();
}

// ── 주간 ──
async function renderWeek(){
  const wrap=document.getElementById('weekWrap');
  wrap.innerHTML='<div class="loading"><span class="spin">⏳</span><br>불러오는 중...</div>';
  try{
    const mo=TODAY.getMonth()+1;
    if(!bdCache[curWeek]){const r=await fetchSheet(KIDS[curWeek].name,mo);bdCache[curWeek]=buildByDate(r);}
    const k=KIDS[curWeek];
    const WD=['일','월','화','수','목','금','토'];
    const dates=[];
    for(let i=13;i>=0;i--){const d=new Date(TODAY);d.setDate(TODAY.getDate()-i);dates.push(d);}
    const vals=dates.map(d=>(bdCache[curWeek][d.toISOString().slice(0,10)]||{}).total||0);
    const maxM=Math.max(...vals,k.goal,1);
    let html='',wkTotal=0,wkDays=0;
    dates.forEach((d,i)=>{
      const ds=d.toISOString().slice(0,10);
      const tot=vals[i];
      const wd=d.getDay();
      const pct=Math.round(tot/maxM*100);
      const isToday=ds===TODAYSTR;
      const stamp=tot>=k.goal&&tot>0?'🏆':'';
      if(i>=7){wkTotal+=tot;if(tot>0)wkDays++;}
      html+=`<div class="week-row">
        <div class="week-day" style="color:${wd===0?'#E53935':wd===6?'#1E88E5':'var(--text2)'};font-weight:${isToday?700:400}">${WD[wd]}<br><span style="font-size:9px">${d.getDate()}일</span></div>
        <div class="week-bar-wrap"><div class="week-bar" style="width:${pct}%;background:${tot>=k.goal?k.color:'#CFD8DC'}"></div></div>
        <span class="week-stamp">${stamp}</span>
        <span class="week-val">${tot>0?tot+'분':'-'}</span>
      </div>`;
    });
    const avg=wkDays>0?Math.round(wkTotal/wkDays):0;
    wrap.innerHTML=`<div class="card"><div class="card-ttl">최근 2주 일별 공부시간</div>${html}</div>
      <div class="m-grid">
        <div class="m-box"><div class="m-lbl">최근 7일 총합</div><div class="m-val">${wkTotal}<span class="m-unit">분</span></div></div>
        <div class="m-box"><div class="m-lbl">평균 (공부한 날)</div><div class="m-val">${avg}<span class="m-unit">분</span></div></div>
      </div>`;
  }catch(e){wrap.innerHTML=`<div class="err">불러오기 실패: ${e.message}</div>`;}
}
function switchWeek(ki){
  curWeek=ki;
  [0,1].forEach(i=>{const b=document.getElementById('wtab'+i);b.classList.toggle('on',i===ki);b.style.background=i===ki?KIDS[i].color:'';b.style.color=i===ki?'#fff':'';});
  renderWeek();
}

function gotoTab(name,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('page-'+name).classList.add('on');
  el.classList.add('on');
  if(name==='overview')renderOverview();
  if(name==='calendar')renderCal();
  if(name==='subject')renderSubj();
  if(name==='weekly')renderWeek();
}

function refreshAll(){
  cache={};bdCache=[null,null];
  const active=document.querySelector('.page.on').id.replace('page-','');
  if(active==='overview')renderOverview();
  if(active==='calendar')renderCal();
  if(active==='subject')renderSubj();
  if(active==='weekly')renderWeek();
}

// 초기화
const WN=['일','월','화','수','목','금','토'];
document.getElementById('hdrDate').textContent=TODAY.getFullYear()+'년 '+(TODAY.getMonth()+1)+'월 '+TODAY.getDate()+'일 ('+WN[TODAY.getDay()]+')';
switchOver(0);
renderCal();
</script>
