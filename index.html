<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>학습 체크표</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root{
  --bg:#F4F6F9;--card:#fff;--border:rgba(0,0,0,0.08);
  --text:#1A1A2E;--text2:#6B7280;--text3:#9CA3AF;
  --accent:#1A237E;--accent-light:#E8EAF6;
  --r:14px;--sh:0 2px 10px rgba(0,0,0,0.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);padding-bottom:80px}

.header{padding:max(48px,calc(40px + env(safe-area-inset-top))) 16px 20px;transition:background .3s}
.hdr-row{display:flex;align-items:flex-start;justify-content:space-between}
.hdr-title{font-size:17px;font-weight:700;color:#fff}
.hdr-date{font-size:12px;color:rgba(255,255,255,.7);margin-top:2px}
.kid-switch{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.kid-btn{padding:9px 0;border-radius:12px;border:2px solid rgba(255,255,255,.35);background:rgba(255,255,255,.13);color:rgba(255,255,255,.85);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;transition:all .2s}
.kid-btn.on{background:#fff;border-color:#fff}

.tab-bar{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.tab{flex:1;padding:12px 2px;font-size:12px;font-weight:500;text-align:center;cursor:pointer;color:var(--text3);border:none;border-bottom:2.5px solid transparent;background:none;font-family:inherit}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}

.page{display:none;padding:14px}
.page.on{display:block}

/* 요약 */
.sum-card{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
.sum-lbl{font-size:12px;color:var(--text2)}
.sum-total{font-size:32px;font-weight:700;color:var(--text);line-height:1.1;margin:4px 0}
.sum-unit{font-size:14px;font-weight:400;color:var(--text2)}
.goal-bar-bg{height:6px;background:#F0F0F0;border-radius:3px;margin:10px 0 8px;overflow:hidden}
.goal-bar{height:100%;border-radius:3px;transition:width .4s}
.praise{font-size:13px;color:var(--text2);background:var(--bg);border-radius:10px;padding:10px 12px;line-height:1.5}

/* 과목 카드 */
.scard{background:var(--card);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--sh);overflow:hidden}
.scard-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none}
.scard-left{display:flex;align-items:center;gap:10px}
.scard-dot{width:11px;height:11px;border-radius:50%}
.scard-name{font-size:15px;font-weight:600}
.scard-right{display:flex;align-items:center;gap:8px}
.scard-total{font-size:13px;font-weight:700}
.scard-arrow{font-size:11px;color:var(--text3);transition:transform .2s;display:inline-block}
.scard-body{display:none;border-top:1px solid var(--border)}

.session{padding:12px 16px;border-bottom:1px dashed var(--border)}
.session:last-child{border-bottom:none}
.session-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.session-num{font-size:11px;color:var(--text3)}
.session-del{background:none;border:none;color:#E53935;font-size:12px;cursor:pointer;padding:2px 6px;font-family:inherit}
.time-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.time-lbl{font-size:12px;color:var(--text2);width:28px;flex-shrink:0}
.time-inp{flex:1;padding:9px 11px;border:1px solid var(--border);border-radius:9px;background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;outline:none}
.time-inp:focus{border-color:var(--accent)}
.time-mins{font-size:13px;font-weight:700;min-width:40px;text-align:right;flex-shrink:0}
.memo-inp{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:9px;background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;resize:none;height:52px;outline:none;line-height:1.5}
.memo-inp:focus{border-color:var(--accent)}
.chk-btn{width:100%;margin-top:8px;padding:11px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.chk-btn.done{background:#E8F5E9;color:#2E7D32}
.chk-btn.undone{background:var(--bg);color:var(--text2);border:1px solid var(--border)}

.add-session-btn{width:calc(100% - 32px);margin:10px 16px;padding:10px;border:1px dashed var(--border);border-radius:9px;background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit}
.add-session-btn:active{background:var(--bg)}

.save-btn{width:100%;padding:14px;color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;transition:opacity .15s}
.save-btn:active{opacity:.85}
.save-btn:disabled{opacity:.5}
.save-hint{font-size:12px;color:var(--text3);text-align:center;margin-top:8px;min-height:18px}

/* 달력 */
.cal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);border-radius:9px;font-size:14px;cursor:pointer;color:var(--text);font-family:inherit}
.cal-title{font-size:15px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{font-size:10px;font-weight:600;color:var(--text3);text-align:center;padding:3px 0}
.cal-dow:first-child{color:#E53935}.cal-dow:last-child{color:#1E88E5}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;font-size:12px;font-weight:500;background:var(--card);border:1px solid var(--border);gap:1px}
.cal-day.empty{background:transparent;border:none}
.cal-day.today{font-weight:700}
.cal-day.has-data{background:#E8F5E9;border-color:#A5D6A7}
.cal-day.sun{color:#E53935}.cal-day.sat{color:#1E88E5}
.cal-min{font-size:9px;color:#388E3C}
.cal-stamp{font-size:10px}

/* 통계 */
.stat-card{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--sh);margin-bottom:12px}
.stat-ttl{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.bar-lbl{font-size:12px;color:var(--text2);width:80px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-bg{flex:1;height:8px;background:#F0F0F0;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s}
.bar-val{font-size:11px;color:var(--text2);width:44px;text-align:right;flex-shrink:0}
.m-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.m-box{background:var(--bg);border-radius:10px;padding:12px 14px}
.m-lbl{font-size:11px;color:var(--text2);margin-bottom:4px}
.m-val{font-size:22px;font-weight:700;color:var(--text)}
.m-unit{font-size:12px;font-weight:400;color:var(--text2);margin-left:2px}

/* 목표 설정 */
.goal-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.goal-row label{font-size:13px;color:var(--text);flex:1}
.goal-inp{width:72px;padding:8px 10px;border:1px solid var(--border);border-radius:9px;background:var(--bg);color:var(--text);font-size:14px;font-weight:700;font-family:inherit;text-align:center;outline:none}
.goal-save{padding:9px 14px;color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}

/* 도장 팝업 */
.stamp-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:9999;opacity:0;pointer-events:none;transition:opacity .3s}
.stamp-ov.show{opacity:1;pointer-events:all}
.stamp-box{background:#fff;border-radius:24px;padding:32px 24px;text-align:center;max-width:290px;width:90%;transform:scale(.7);transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
.stamp-ov.show .stamp-box{transform:scale(1)}
.stamp-img{font-size:80px;line-height:1;display:block;margin-bottom:10px;animation:sBounce .5s cubic-bezier(.34,1.56,.64,1) .1s both}
@keyframes sBounce{from{transform:scale(0) rotate(-15deg)}to{transform:scale(1) rotate(-4deg)}}
.stamp-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px}
.stamp-sub{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:20px;white-space:pre-line}
.stamp-close{width:100%;padding:12px;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<div class="header" id="mainHdr">
  <div class="hdr-row">
    <div>
      <div class="hdr-title">학습 체크표</div>
      <div class="hdr-date" id="hdrDate"></div>
    </div>
  </div>
  <div class="kid-switch">
    <button class="kid-btn on" id="kbtn0" onclick="switchKid(0)">한별 (중1)</button>
    <button class="kid-btn" id="kbtn1" onclick="switchKid(1)">한솔 (초3)</button>
  </div>
</div>

<div class="tab-bar" id="tabBar">
  <button class="tab on" id="tab0" onclick="gotoTab(0)">오늘 기록</button>
  <button class="tab" id="tab1" onclick="gotoTab(1)">달력</button>
  <button class="tab" id="tab2" onclick="gotoTab(2)">통계</button>
</div>

<!-- 오늘 기록 -->
<div class="page on" id="page0">
  <div class="sum-card">
    <div class="sum-lbl">오늘 총 순공시간</div>
    <div><span class="sum-total" id="sumTotal">0</span><span class="sum-unit">분</span></div>
    <div class="goal-bar-bg"><div class="goal-bar" id="goalBar" style="width:0%"></div></div>
    <div class="praise" id="praiseMsg">과목 카드를 열어 시간을 입력해보세요!</div>
  </div>
  <div id="subjCards"></div>
  <button class="save-btn" id="saveBtn" onclick="saveToSheet()">구글 시트에 저장</button>
  <div class="save-hint" id="saveHint"></div>
</div>

<!-- 달력 -->
<div class="page" id="page1">
  <div class="cal-top">
    <button class="cal-nav" onclick="chMonth(-1)">◀</button>
    <span class="cal-title" id="calTitle"></span>
    <button class="cal-nav" onclick="chMonth(1)">▶</button>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- 통계 -->
<div class="page" id="page2">
  <div class="stat-card">
    <div class="stat-ttl" id="statTtl">이번 달 과목별 공부시간</div>
    <div id="statBars"></div>
  </div>
  <div class="stat-card">
    <div class="stat-ttl">이번 달 현황</div>
    <div class="m-grid" id="statMetrics"></div>
  </div>
  <div class="stat-card">
    <div class="stat-ttl">⏱ 하루 목표 시간</div>
    <div class="goal-row">
      <label id="goalLbl">목표</label>
      <input type="number" class="goal-inp" id="goalInp" min="10" max="600" step="10" value="120">
      <span style="font-size:13px;color:var(--text2)">분</span>
      <button class="goal-save" id="goalSaveBtn" onclick="saveGoal()">저장</button>
    </div>
    <div style="font-size:11px;color:var(--text3)">목표 달성 시 🏆 도장이 찍혀요!</div>
  </div>
</div>

<!-- 도장 팝업 -->
<div class="stamp-ov" id="stampOv" onclick="if(event.target===this)closeStamp()">
  <div class="stamp-box">
    <span class="stamp-img" id="stampImg">🏆</span>
    <div class="stamp-title" id="stampTitle">참 잘했어요!</div>
    <div class="stamp-sub" id="stampSub"></div>
    <button class="stamp-close" id="stampClose" onclick="closeStamp()">확인</button>
  </div>
</div>

<script>
const SHEET_ID = '18k-eTGSxJrered7NpY-g8U5-pevH67Ccficdbtnu7IY';
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzoRXsoefHfPlR3KWSji7HJ2WZKK-uQbZDP0qX1n3GHRG6SpoOsa-BEludyDrr0KxDTWQ/exec';

const KIDS = [
  { name:'한별', grade:'중1', color:'#1A237E', light:'#E8EAF6',
    subjects:[
      {key:'math', name:'수학',  color:'#1565C0'},
      {key:'eng',  name:'영어',  color:'#2E7D32'},
      {key:'kor',  name:'국어',  color:'#E65100'},
      {key:'soc',  name:'사회',  color:'#4527A0'},
      {key:'sci',  name:'과학',  color:'#B71C1C'},
      {key:'book', name:'독서(신문,독서평설 포함)', color:'#00695C'},
    ]},
  { name:'한솔', grade:'초3', color:'#1B5E20', light:'#E8F5E9',
    subjects:[
      {key:'math', name:'수학',  color:'#1565C0'},
      {key:'eng',  name:'영어',  color:'#2E7D32'},
      {key:'dok',  name:'독서(독서평설 포함)', color:'#E65100'},
      {key:'only', name:'온리원', color:'#6A1B9A'},
    ]},
];

const TODAY = new Date();
const TODAYSTR = TODAY.toISOString().slice(0,10);
let curKid = 0, curTab = 0;
let calYear = TODAY.getFullYear(), calMonth = TODAY.getMonth();
let stampShown = false;

// ── 로컬 스토리지 ──
function lsGet(k){ try{ return JSON.parse(localStorage.getItem(k)); }catch{ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch{} }

function getGoal(ki){ return parseInt(lsGet('goal_'+ki) || (ki===0?120:60)); }
function saveGoal(){
  const v = parseInt(document.getElementById('goalInp').value) || 60;
  lsSet('goal_'+curKid, v);
  stampShown = false;
  updateSummary();
  const btn = document.getElementById('goalSaveBtn');
  btn.textContent='✓ 저장!'; btn.style.background='#2E7D32';
  setTimeout(()=>{ btn.textContent='저장'; btn.style.background=''; }, 1200);
}

// 세션 데이터: [{start, end, memo, done}]
function getSessions(ki, dateStr, subjKey){
  const day = lsGet('day_'+ki+'_'+dateStr) || {};
  const val = day[subjKey];
  if(!val) return [{start:'',end:'',memo:'',done:false}];
  if(Array.isArray(val)) return val.length ? val : [{start:'',end:'',memo:'',done:false}];
  return [val]; // 구형 단일 객체 호환
}

function saveSessions(ki, dateStr, subjKey, sessions){
  const day = lsGet('day_'+ki+'_'+dateStr) || {};
  day[subjKey] = sessions;
  lsSet('day_'+ki+'_'+dateStr, day);
}

function calcMin(s, e){
  if(!s||!e) return 0;
  const [sh,sm]=s.split(':').map(Number), [eh,em]=e.split(':').map(Number);
  const d=(eh*60+em)-(sh*60+sm); return d>0?d:0;
}

// ── 테마 ──
function applyTheme(){
  const k = KIDS[curKid];
  document.getElementById('mainHdr').style.background = k.color;
  document.querySelectorAll('.tab.on').forEach(t=>{ t.style.color=k.color; t.style.borderBottomColor=k.color; });
  document.getElementById('goalBar').style.background = k.color;
  document.getElementById('goalSaveBtn').style.background = k.color;
  document.getElementById('saveBtn').style.background = k.color;
  document.getElementById('stampClose').style.background = k.color;
  KIDS.forEach((_,i)=>{
    const b = document.getElementById('kbtn'+i);
    b.style.color = i===curKid ? k.color : '';
  });
}

// ── 탭 전환 ──
function gotoTab(n){
  curTab = n;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>{ t.classList.remove('on'); t.style.color=''; t.style.borderBottomColor=''; });
  document.getElementById('page'+n).classList.add('on');
  const tab = document.getElementById('tab'+n);
  tab.classList.add('on');
  tab.style.color = KIDS[curKid].color;
  tab.style.borderBottomColor = KIDS[curKid].color;
  if(n===1) renderCal();
  if(n===2) renderStats();
}

// ── 아이 전환 ──
function switchKid(ki){
  curKid = ki;
  KIDS.forEach((_,i)=>{
    const b = document.getElementById('kbtn'+i);
    b.classList.toggle('on', i===ki);
  });
  applyTheme();
  stampShown = false;
  buildCards();
  if(curTab===1) renderCal();
  if(curTab===2) renderStats();
}

// ── 카드 빌드 ──
function buildCards(){
  const k = KIDS[curKid];
  const wrap = document.getElementById('subjCards');
  wrap.innerHTML = '';
  k.subjects.forEach(s=>{
    const sessions = getSessions(curKid, TODAYSTR, s.key);
    const totalMins = sessions.reduce((sum,ses)=>sum+calcMin(ses.start,ses.end),0);
    const div = document.createElement('div');
    div.className = 'scard';
    div.innerHTML =
      '<div class="scard-hdr" onclick="toggleCard(\''+s.key+'\')">'
        +'<div class="scard-left">'
          +'<div class="scard-dot" style="background:'+s.color+'"></div>'
          +'<span class="scard-name">'+s.name+'</span>'
        +'</div>'
        +'<div class="scard-right">'
          +'<span class="scard-total" id="tot_'+s.key+'" style="color:'+s.color+'">'+(totalMins>0?totalMins+'분':'')+'</span>'
          +'<span class="scard-arrow" id="arr_'+s.key+'">▼</span>'
        +'</div>'
      +'</div>'
      +'<div class="scard-body" id="body_'+s.key+'">'
        +'<div id="sessions_'+s.key+'">'+buildSessionsHTML(s, sessions)+'</div>'
        +'<button class="add-session-btn" onclick="addSession(\''+s.key+'\')">+ 같은 과목 세션 추가</button>'
      +'</div>';
    wrap.appendChild(div);
  });
  updateSummary();
}

function buildSessionsHTML(s, sessions){
  return sessions.map(function(ses,i){ return buildOneSession(s,i,ses); }).join('');
}

function buildOneSession(s, i, ses){
  const mins = calcMin(ses.start, ses.end);
  const done = ses.done || mins>=10;
  return '<div class="session" id="ses_'+s.key+'_'+i+'">'
    +(i>0
      ? '<div class="session-hdr"><span class="session-num">세션 '+(i+1)+'</span>'
        +'<button class="session-del" onclick="removeSession(\''+s.key+'\','+i+')">✕ 삭제</button></div>'
      : '')
    +'<div class="time-row">'
      +'<span class="time-lbl">시작</span>'
      +'<input type="time" class="time-inp" id="sv_'+s.key+'_'+i+'" value="'+(ses.start||'')+'" onchange="onTimeChange(\''+s.key+'\','+i+')">'
    +'</div>'
    +'<div class="time-row">'
      +'<span class="time-lbl">종료</span>'
      +'<input type="time" class="time-inp" id="ev_'+s.key+'_'+i+'" value="'+(ses.end||'')+'" onchange="onTimeChange(\''+s.key+'\','+i+')">'
      +'<span class="time-mins" id="md_'+s.key+'_'+i+'" style="color:'+s.color+'">'+(mins>0?mins+'분':'-')+'</span>'
    +'</div>'
    +'<textarea class="memo-inp" id="mm_'+s.key+'_'+i+'" placeholder="공부한 내용 메모...">'+(ses.memo||'')+'</textarea>'
    +'<button class="chk-btn '+(done?'done':'undone')+'" id="cb_'+s.key+'_'+i+'" onclick="toggleDone(\''+s.key+'\','+i+')">'
      +(done?'✓ 완료! 잘했어요':'완료 체크')
    +'</button>'
  +'</div>';
}

function toggleCard(key){
  const body = document.getElementById('body_'+key);
  const arr  = document.getElementById('arr_'+key);
  const open = body.style.display === 'block';
  body.style.display = open ? 'none' : 'block';
  arr.style.transform = open ? '' : 'rotate(180deg)';
}

function onTimeChange(key, idx){
  const sv = document.getElementById('sv_'+key+'_'+idx);
  const ev = document.getElementById('ev_'+key+'_'+idx);
  if(!sv||!ev) return;
  const m = calcMin(sv.value, ev.value);
  document.getElementById('md_'+key+'_'+idx).textContent = m>0?m+'분':'-';
  const btn = document.getElementById('cb_'+key+'_'+idx);
  if(btn && m>=10){ btn.className='chk-btn done'; btn.textContent='✓ 완료! 잘했어요'; }
  updateSubjTotal(key);
  updateSummary();
}

function updateSubjTotal(key){
  let total = 0, i = 0;
  while(document.getElementById('ses_'+key+'_'+i)){
    const sv=document.getElementById('sv_'+key+'_'+i);
    const ev=document.getElementById('ev_'+key+'_'+i);
    if(sv&&ev) total+=calcMin(sv.value,ev.value);
    i++;
  }
  const el = document.getElementById('tot_'+key);
  if(el) el.textContent = total>0?total+'분':'';
}

function toggleDone(key, idx){
  const btn = document.getElementById('cb_'+key+'_'+idx);
  if(!btn) return;
  const was = btn.classList.contains('done');
  btn.className = 'chk-btn '+(was?'undone':'done');
  btn.textContent = was?'완료 체크':'✓ 완료! 잘했어요';
}

function addSession(key){
  const subj = KIDS[curKid].subjects.find(s=>s.key===key);
  if(!subj) return;
  let cnt = 0;
  while(document.getElementById('ses_'+key+'_'+cnt)) cnt++;
  const wrap = document.getElementById('sessions_'+key);
  const div = document.createElement('div');
  div.innerHTML = buildOneSession(subj, cnt, {start:'',end:'',memo:'',done:false});
  wrap.appendChild(div.firstElementChild);
}

function removeSession(key, idx){
  const el = document.getElementById('ses_'+key+'_'+idx);
  if(el) el.remove();
  updateSubjTotal(key);
  updateSummary();
}

function updateSummary(){
  let total = 0;
  KIDS[curKid].subjects.forEach(s=>{
    let i=0;
    while(document.getElementById('ses_'+s.key+'_'+i)){
      const sv=document.getElementById('sv_'+s.key+'_'+i);
      const ev=document.getElementById('ev_'+s.key+'_'+i);
      if(sv&&ev) total+=calcMin(sv.value,ev.value);
      i++;
    }
  });
  const goal = getGoal(curKid);
  const pct = Math.min(100, Math.round(total/goal*100));
  document.getElementById('sumTotal').textContent = total;
  document.getElementById('goalBar').style.width = pct+'%';
  let praise='';
  if(total<=0) praise='과목 카드를 열어 시간을 입력해보세요!';
  else if(total>=goal) praise='최고야! 오늘 목표를 완전히 달성했어! 정말 대단해! 🏆';
  else if(total>=goal*.67) praise='잘했어! 조금만 더 하면 목표 달성이야! 화이팅! ⭐';
  else if(total>=goal*.33) praise='좋아! 오늘도 열심히 했구나! 내일도 파이팅! 😊';
  else praise='오늘은 조금 짧았지만, 내일은 더 잘할 수 있어! 💪';
  document.getElementById('praiseMsg').textContent = praise;
  if(total>=goal && !stampShown){ stampShown=true; showStamp(total,goal); }
  if(total<goal) stampShown=false;
}

// ── 저장 ──
function collectSessions(){
  const result = {};
  KIDS[curKid].subjects.forEach(s=>{
    const sessions=[]; let i=0;
    while(document.getElementById('ses_'+s.key+'_'+i)){
      const sv=document.getElementById('sv_'+s.key+'_'+i);
      const ev=document.getElementById('ev_'+s.key+'_'+i);
      const mv=document.getElementById('mm_'+s.key+'_'+i);
      const btn=document.getElementById('cb_'+s.key+'_'+i);
      if(sv&&ev&&(sv.value||ev.value||(mv&&mv.value))){
        sessions.push({start:sv.value,end:ev.value,memo:mv?mv.value:'',done:btn?btn.classList.contains('done'):false});
      }
      i++;
    }
    if(!sessions.length) sessions.push({start:'',end:'',memo:'',done:false});
    result[s.key] = sessions;
  });
  return result;
}

async function saveToSheet(){
  const btn=document.getElementById('saveBtn');
  const hint=document.getElementById('saveHint');
  btn.disabled=true; btn.textContent='저장 중...';
  const sessions = collectSessions();
  // 로컬 저장
  KIDS[curKid].subjects.forEach(s=>{ lsSet('day_'+curKid+'_'+TODAYSTR, Object.assign(lsGet('day_'+curKid+'_'+TODAYSTR)||{}, {[s.key]:sessions[s.key]})); });
  // 스탬프 저장
  const total=parseInt(document.getElementById('sumTotal').textContent)||0;
  const goal=getGoal(curKid);
  if(total>=goal) lsSet('stamp_'+curKid+'_'+TODAYSTR,{pct:Math.round(total/goal*100),img:'🏆'});

  const [,mo]=TODAYSTR.split('-');
  const rows=[];
  KIDS[curKid].subjects.forEach(s=>{
    const k=KIDS[curKid];
    (sessions[s.key]||[]).forEach(ses=>{
      const mins=calcMin(ses.start,ses.end);
      if(ses.start||ses.end||ses.memo)
        rows.push([TODAYSTR, s.name, ses.start, ses.end, mins, ses.memo||'']);
    });
  });
  if(!rows.length){ btn.disabled=false; btn.textContent='구글 시트에 저장'; hint.textContent='입력된 데이터가 없어요.'; return; }
  try{
    const res=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({sheetId:SHEET_ID,kid:KIDS[curKid].name,month:parseInt(mo),rows})});
    const txt=await res.text();
    hint.textContent=txt.includes('ok')?'✓ 저장 완료! '+new Date().toLocaleTimeString():'오류가 발생했어요.';
  }catch{ hint.textContent='연결 실패. 인터넷 연결을 확인해주세요.'; }
  btn.disabled=false; btn.textContent='구글 시트에 저장';
  // 저장 성공 시 시트에서 재로드해서 동기화
  if(hint.textContent.includes('완료')){
    await loadTodayFromSheet(curKid);
  }
}

// ── 달력 ──
function renderCal(){
  document.getElementById('calTitle').textContent=calYear+'년 '+(calMonth+1)+'월';
  const grid=document.getElementById('calGrid');
  grid.innerHTML='';
  ['일','월','화','수','목','금','토'].forEach((d,i)=>{
    const el=document.createElement('div'); el.className='cal-dow';
    if(i===0)el.style.color='#E53935'; if(i===6)el.style.color='#1E88E5';
    el.textContent=d; grid.appendChild(el);
  });
  const first=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  for(let i=0;i<first;i++){ const e=document.createElement('div'); e.className='cal-day empty'; grid.appendChild(e); }
  for(let d=1;d<=days;d++){
    const ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const day=lsGet('day_'+curKid+'_'+ds)||{};
    let tot=0;
    Object.values(day).forEach(v=>{
      const arr=Array.isArray(v)?v:[v];
      arr.forEach(ses=>{ if(ses) tot+=calcMin(ses.start,ses.end); });
    });
    const wd=new Date(calYear,calMonth,d).getDay();
    const el=document.createElement('div');
    const cls=['cal-day'];
    if(ds===TODAYSTR){ cls.push('today'); }
    if(tot>0) cls.push('has-data');
    if(wd===0) cls.push('sun'); if(wd===6) cls.push('sat');
    el.className=cls.join(' ');
    if(ds===TODAYSTR){ el.style.borderColor=KIDS[curKid].color; el.style.color=KIDS[curKid].color; }
    const stamp=lsGet('stamp_'+curKid+'_'+ds);
    el.innerHTML='<span>'+d+'</span>'+(tot>0?'<span class="cal-min">'+tot+'분</span>':'')+(stamp?'<span class="cal-stamp">'+stamp.img+'</span>':'');
    grid.appendChild(el);
  }
}
function chMonth(d){ calMonth+=d; if(calMonth>11){calMonth=0;calYear++;} if(calMonth<0){calMonth=11;calYear--;} renderCal(); }

// ── 통계 ──
function renderStats(){
  const k=KIDS[curKid];
  document.getElementById('statTtl').textContent=k.name+' 이번 달 과목별 공부시간';
  document.getElementById('goalLbl').textContent=k.name+' 목표';
  document.getElementById('goalInp').value=getGoal(curKid);
  document.getElementById('goalSaveBtn').style.background=k.color;
  const y=TODAY.getFullYear(), mo=TODAY.getMonth();
  const daysInMo=new Date(y,mo+1,0).getDate();
  const totals={};k.subjects.forEach(s=>totals[s.key]=0);
  let studyDays=0,totalAll=0,goalDays=0,curStr=0,maxStr=0;
  const goal=getGoal(curKid);
  for(let d=1;d<=daysInMo;d++){
    const ds=y+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const day=lsGet('day_'+curKid+'_'+ds)||{};
    let dt=0;
    k.subjects.forEach(s=>{
      const arr=Array.isArray(day[s.key])?day[s.key]:[day[s.key]];
      arr.forEach(ses=>{ if(ses){ const m=calcMin(ses.start,ses.end); totals[s.key]+=m; dt+=m; } });
    });
    if(dt>0){studyDays++;curStr++;}else{maxStr=Math.max(maxStr,curStr);curStr=0;}
    if(dt>=goal) goalDays++;
    totalAll+=dt;
  }
  maxStr=Math.max(maxStr,curStr);
  const maxV=Math.max(...Object.values(totals),1);
  const bars=document.getElementById('statBars');
  bars.innerHTML='';
  k.subjects.forEach(s=>{
    const pct=Math.round(totals[s.key]/maxV*100);
    const h=Math.floor(totals[s.key]/60),m=totals[s.key]%60;
    const v=h>0?h+'시간'+(m?m+'분':''):totals[s.key]+'분';
    bars.innerHTML+='<div class="bar-row"><span class="bar-lbl" title="'+s.name+'">'+s.name+'</span><div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%;background:'+s.color+'"></div></div><span class="bar-val">'+v+'</span></div>';
  });
  const avg=studyDays>0?Math.round(totalAll/studyDays):0;
  document.getElementById('statMetrics').innerHTML=
    '<div class="m-box"><div class="m-lbl">공부한 날</div><div class="m-val">'+studyDays+'<span class="m-unit">일</span></div></div>'
    +'<div class="m-box"><div class="m-lbl">하루 평균</div><div class="m-val">'+avg+'<span class="m-unit">분</span></div></div>'
    +'<div class="m-box"><div class="m-lbl">이번 달 총합</div><div class="m-val">'+totalAll+'<span class="m-unit">분</span></div></div>'
    +'<div class="m-box"><div class="m-lbl">목표 달성일</div><div class="m-val">'+goalDays+'<span class="m-unit">일</span></div></div>';
}

// ── 도장 ──
function showStamp(total, goal){
  const k=KIDS[curKid];
  const pct=Math.round(total/goal*100);
  let img='🏆',title='참 잘했어요!',sub='';
  if(pct>=100){img='🏆';title='참 잘했어요!';sub=k.name+'이 오늘 목표를 완전히 달성했어요!\n정말 대단해요! 👏';}
  else if(pct>=67){img='⭐';title='잘했어요!';sub='조금만 더 하면 목표 달성이에요!\n내일도 화이팅! 💪';}
  else{img='😊';title='좋았어요!';sub='오늘도 열심히 했구나!\n내일은 더 잘할 수 있어!';}
  document.getElementById('stampImg').textContent=img;
  document.getElementById('stampTitle').textContent=title;
  document.getElementById('stampSub').textContent=sub;
  document.getElementById('stampOv').classList.add('show');
}
function closeStamp(){ document.getElementById('stampOv').classList.remove('show'); }

// ── 시트에서 오늘 데이터 불러오기 ──
async function loadTodayFromSheet(ki){
  try{
    const k=KIDS[ki];
    const mo=TODAY.getMonth()+1;
    const url=SCRIPT_URL+'?sheetId='+SHEET_ID+'&kid='+encodeURIComponent(k.name)+'&month='+mo;
    const res=await fetch(url);
    if(!res.ok) return;
    const rows=await res.json();
    if(!Array.isArray(rows)||rows.length===0) return;

    // 오늘 날짜 행만 필터
    const todayRows=rows.filter(r=>String(r['날짜']||'').slice(0,10)===TODAYSTR);
    if(todayRows.length===0) return;

    // 과목별로 세션 배열 구성
    const dayData={};
    todayRows.forEach(function(r){
      const subjName=String(r['과목']||'').trim();
      // 과목명 → key 변환
      const subjInfo=k.subjects.find(s=>s.name===subjName);
      if(!subjInfo) return;
      if(!dayData[subjInfo.key]) dayData[subjInfo.key]=[];
      dayData[subjInfo.key].push({
        start:String(r['시작']||''),
        end:String(r['종료']||''),
        memo:String(r['메모']||''),
        done:true
      });
    });

    // localStorage에 저장 (시트 데이터가 더 최신이므로 덮어쓰기)
    const existing=lsGet('day_'+ki+'_'+TODAYSTR)||{};
    Object.keys(dayData).forEach(function(key){
      existing[key]=dayData[key];
    });
    lsSet('day_'+ki+'_'+TODAYSTR, existing);
    console.log(k.name+' 오늘 데이터 시트에서 로드 완료:', Object.keys(dayData).length+'과목');
  }catch(e){
    console.warn('시트 로드 실패 (오프라인이거나 설정 오류):', e.message);
  }
}

(async function(){
